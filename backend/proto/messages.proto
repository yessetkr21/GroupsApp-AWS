syntax = "proto3";

package messages;

service MessagesService {
  rpc GetGroupMessages  (GetGroupMessagesRequest)   returns (GetMessagesResponse);
  rpc GetChannelMessages(GetChannelMessagesRequest) returns (GetMessagesResponse);
  rpc GetDirectMessages (GetDirectMessagesRequest)  returns (GetMessagesResponse);
}

// ── Requests ──────────────────────────────────────────────────────────────────

message GetGroupMessagesRequest {
  string group_id = 1;
  int32  limit    = 2;
  string before   = 3;   // ISO timestamp for pagination
}

message GetChannelMessagesRequest {
  string channel_id = 1;
  int32  limit      = 2;
  string before     = 3;
}

message GetDirectMessagesRequest {
  string user_id       = 1;
  string other_user_id = 2;
  int32  limit         = 3;
  string before        = 4;
}

// ── Shared types ──────────────────────────────────────────────────────────────

message Message {
  string id              = 1;
  string sender_id       = 2;
  string sender_username = 3;
  string sender_avatar   = 4;
  string group_id        = 5;
  string channel_id      = 6;
  string receiver_id     = 7;
  string content         = 8;
  string message_type    = 9;
  string file_url        = 10;
  string file_name       = 11;
  string status          = 12;
  string created_at      = 13;
  bool   is_read         = 14;
}

// ── Responses ─────────────────────────────────────────────────────────────────

message GetMessagesResponse {
  bool             success  = 1;
  repeated Message messages = 2;
  string           error    = 3;
}
