syntax = "proto3";

package groups;

service GroupsService {
  // ── Groups ──────────────────────────────────────────────────────────────
  rpc CreateGroup (CreateGroupRequest) returns (GroupResponse);
  rpc GetGroups   (GetGroupsRequest)   returns (GetGroupsResponse);
  rpc GetGroup    (GetGroupRequest)    returns (GroupResponse);
  rpc UpdateGroup (UpdateGroupRequest) returns (StatusResponse);
  rpc DeleteGroup (DeleteGroupRequest) returns (StatusResponse);

  // ── Members ─────────────────────────────────────────────────────────────
  rpc GetMembers   (GetMembersRequest)   returns (GetMembersResponse);
  rpc AddMember    (AddMemberRequest)    returns (StatusResponse);
  rpc RemoveMember (RemoveMemberRequest) returns (StatusResponse);

  // ── Channels ────────────────────────────────────────────────────────────
  rpc GetChannels   (GetChannelsRequest)   returns (GetChannelsResponse);
  rpc CreateChannel (CreateChannelRequest) returns (ChannelResponse);
  rpc DeleteChannel (DeleteChannelRequest) returns (StatusResponse);

  // ── Contacts ────────────────────────────────────────────────────────────
  rpc GetContacts  (GetContactsRequest)  returns (GetContactsResponse);
  rpc AddContact   (AddContactRequest)   returns (AddContactResponse);
  rpc DeleteContact(DeleteContactRequest)returns (StatusResponse);
  rpc SearchUsers  (SearchUsersRequest)  returns (SearchUsersResponse);
}

// ── Group types ───────────────────────────────────────────────────────────────

message Group {
  string id              = 1;
  string name            = 2;
  string description     = 3;
  string created_by      = 4;
  string role            = 5;
  int32  member_count    = 6;
  string last_message    = 7;
  string last_message_at = 8;
  string created_at      = 9;
}

message CreateGroupRequest {
  string name        = 1;
  string description = 2;
  string user_id     = 3;
}

message GetGroupsRequest {
  string user_id = 1;
}

message GetGroupRequest {
  string group_id = 1;
  string user_id  = 2;
}

message UpdateGroupRequest {
  string group_id     = 1;
  string user_id      = 2;
  string name         = 3;
  string description  = 4;
}

message DeleteGroupRequest {
  string group_id = 1;
  string user_id  = 2;
}

message GroupResponse {
  bool   success = 1;
  Group  group   = 2;
  string error   = 3;
}

message GetGroupsResponse {
  bool           success = 1;
  repeated Group groups  = 2;
  string         error   = 3;
}

// ── Member types ──────────────────────────────────────────────────────────────

message Member {
  string id         = 1;
  string username   = 2;
  string email      = 3;
  string avatar_url = 4;
  bool   is_online  = 5;
  string last_seen  = 6;
  string role       = 7;
  string joined_at  = 8;
}

message GetMembersRequest {
  string group_id = 1;
}

message AddMemberRequest {
  string group_id         = 1;
  string user_id          = 2;  // requestor
  string target_user_id   = 3;
  string target_username  = 4;
}

message RemoveMemberRequest {
  string group_id      = 1;
  string user_id       = 2;  // requestor
  string target_user_id = 3;
}

message GetMembersResponse {
  bool            success = 1;
  repeated Member members = 2;
  string          error   = 3;
}

// ── Channel types ─────────────────────────────────────────────────────────────

message Channel {
  string id           = 1;
  string group_id     = 2;
  string name         = 3;
  string description  = 4;
  string created_by   = 5;
  string created_at   = 6;
  string last_message = 7;
}

message GetChannelsRequest {
  string group_id = 1;
}

message CreateChannelRequest {
  string group_id    = 1;
  string name        = 2;
  string description = 3;
  string user_id     = 4;
}

message DeleteChannelRequest {
  string group_id   = 1;
  string channel_id = 2;
  string user_id    = 3;
}

message ChannelResponse {
  bool    success = 1;
  Channel channel = 2;
  string  error   = 3;
}

message GetChannelsResponse {
  bool             success  = 1;
  repeated Channel channels = 2;
  string           error    = 3;
}

// ── Contact types ─────────────────────────────────────────────────────────────

message Contact {
  string id            = 1;
  string username      = 2;
  string email         = 3;
  string avatar_url    = 4;
  bool   is_online     = 5;
  string last_seen     = 6;
  string contact_since = 7;
}

message GetContactsRequest {
  string user_id = 1;
}

message AddContactRequest {
  string user_id          = 1;
  string target_username  = 2;
}

message DeleteContactRequest {
  string user_id        = 1;
  string target_user_id = 2;
}

message SearchUsersRequest {
  string query   = 1;
  string user_id = 2;
}

message GetContactsResponse {
  bool             success  = 1;
  repeated Contact contacts = 2;
  string           error    = 3;
}

message AddContactResponse {
  bool    success          = 1;
  Contact contact          = 2;
  string  added_user_id    = 3;
  string  adder_info_json  = 4;  // JSON string with adder's info for Socket.IO notification
  string  error            = 5;
}

message SearchUsersResponse {
  bool             success = 1;
  repeated Contact users   = 2;
  string           error   = 3;
}

// ── Generic ───────────────────────────────────────────────────────────────────

message StatusResponse {
  bool   success = 1;
  string message = 2;
  string error   = 3;
}
