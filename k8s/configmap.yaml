apiVersion: v1
kind: ConfigMap
metadata:
  name: groupsapp-config
  namespace: groupsapp
data:
  NODE_ENV: "production"
  PORT: "3000"
  MESSAGES_SERVICE_PORT: "50051"
  GROUPS_SERVICE_PORT: "50052"
  MESSAGES_SERVICE_ADDR: "messages-service:50051"
  GROUPS_SERVICE_ADDR: "groups-service:50052"
  RABBITMQ_URL: "amqp://groupsapp:groupsapp123@rabbitmq:5672"
  ETCD_HOSTS: "http://etcd:2379"
  REDIS_URL: "redis://redis:6379"
  DB_PORT: "3306"
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "chat-archivos"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "http://localhost,https://groupsapp.example.com"
