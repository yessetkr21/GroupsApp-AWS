---
# ── etcd Deployment (coordinación distribuida) ─────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: groupsapp
  labels:
    app: etcd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: 533267341242.dkr.ecr.us-east-1.amazonaws.com/groupsapp-etcd:latest
          command:
            - /usr/local/bin/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-cluster=default=http://etcd:2380
            - --initial-advertise-peer-urls=http://etcd:2380
            - --data-dir=/etcd-data
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            exec:
              command: ["etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: groupsapp
spec:
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
