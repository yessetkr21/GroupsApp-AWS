---
# ── messages-service Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messages-service
  namespace: groupsapp
  labels:
    app: messages-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: messages-service
  template:
    metadata:
      labels:
        app: messages-service
    spec:
      containers:
        - name: messages-service
          image: groupsapp-messages-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
          envFrom:
            - configMapRef:
                name: groupsapp-config
            - secretRef:
                name: groupsapp-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('@grpc/grpc-js').credentials.createInsecure(); process.exit(0)"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('@grpc/grpc-js').credentials.createInsecure(); process.exit(0)"
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: messages-service
  namespace: groupsapp
spec:
  selector:
    app: messages-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
---
# ── HPA for messages-service ───────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: messages-service-hpa
  namespace: groupsapp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: messages-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
