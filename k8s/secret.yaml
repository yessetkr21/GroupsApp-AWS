# ⚠️  TEMPLATE ONLY — do NOT commit real credentials.
# Fill in base64-encoded values and apply manually:
#   echo -n 'value' | base64
#   kubectl apply -f secret.yaml -n groupsapp
apiVersion: v1
kind: Secret
metadata:
  name: groupsapp-secrets
  namespace: groupsapp
type: Opaque
data:
  DB_HOST: <base64-encoded-rds-endpoint>
  DB_USER: <base64-encoded-db-user>
  DB_PASSWORD: <base64-encoded-db-password>
  DB_NAME: <base64-encoded-db-name>
  JWT_SECRET: <base64-encoded-jwt-secret>
  AWS_ACCESS_KEY_ID: <base64-encoded-access-key>
  AWS_SECRET_ACCESS_KEY: <base64-encoded-secret-key>
  RABBITMQ_USER: <base64-encoded-rabbitmq-user>
  RABBITMQ_PASS: <base64-encoded-rabbitmq-pass>
